version: "3"
services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "5000:80"
  node-app:
    deploy:
      replicas: 8
      restart_policy:
        condition: any
      update_config:
        parallelism: 2       
        delay: 15s
    build:
      context: .
      args:
        - NODE_ENV:production
    # ports:
    #   - "5000:5000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
    #  env_file:
    #    - ./.env
    command: node index.js
 
