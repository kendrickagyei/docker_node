version: "3"
services:
  nginx:
    image: nginx
    ports:
      - "5000:80"
  node-app:
    build:
      context: .
      args:
        - NODE_ENV:production
    # ports:
    #   - "5000:5000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
    #  env_file:
    #    - ./.env
    command: node index.js
        