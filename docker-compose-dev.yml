services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "5000:80"
  node-app:
    build:
      context: .
      args:
        - NODE_ENV:development
    # ports:
    #   - "5000:5000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      # - PORT=5000
      - MONGO_USER=root
      - MONGO_PASSWORD=example
      - SESSION_SECRET=secret
    depends_on:
      - mongo

  mongo:
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - mongo-db:/data/db


volumes:
  mongo-db:
  node_modules:
