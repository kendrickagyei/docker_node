services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  node-app:
    build: .
    image: kendrickagyei/docker_node
    # ports:
    #   - "5000:5000"
    volumes:
      - ./:/app
      - /app/node_modules
    # environment:
    #   - PORT=5000
    #  env_file:
    #    - ./.env
    depends_on:
      - mongo
  mongo:
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
        

  redis:
    image: redis
    ports:
      - "6379:6379"
